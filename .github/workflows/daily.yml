name: Radar de noticias (diario)

on:
  schedule:
    # 11:00 UTC ≈ 08:00 en Paraguay. Cambiá el número si querés otro horario.
    - cron: "0 11 * * *"
  workflow_dispatch: {}   # permite correrlo a mano desde la pestaña Actions

permissions:
  contents: write         # para poder guardar la memoria y el sitio en el repo

jobs:
  radar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Correr el radar
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python run.py

      - name: Guardar cambios (memoria + sitio)
        run: |
          git config user.name  "news-radar-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs state
          git commit -m "Radar $(date -u +%Y-%m-%d)" || echo "sin cambios"
          git push
